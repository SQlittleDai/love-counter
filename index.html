<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💕 我们的时光</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fdf2f4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小时光">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-from: #fdf2f4;
    --bg-via: #faf0f4;
    --bg-to:   #f5edf2;
    --card-bg: rgba(255,255,255,0.62);
    --card-border: rgba(255,255,255,0.7);
    --accent:      #cc7a8c;
    --accent-soft: #e4bcc6;
    --accent-deep: #a85e70;
    --text:        #4a3540;
    --text-soft:   #8c7380;
    --text-muted:  #b09aa5;
    --shadow-sm:   0 1px 3px rgba(160,120,135,0.06);
    --shadow-md:   0 4px 20px rgba(160,120,135,0.08), 0 0 0 0.5px rgba(160,120,135,0.04);
    --shadow-lg:   0 8px 32px rgba(160,120,135,0.12), 0 0 1px rgba(160,120,135,0.05);
    --radius: 24px;
    --font-cute: 'ZCOOL KuaiLe', cursive;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(170deg, var(--bg-from) 0%, var(--bg-via) 40%, var(--bg-to) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
    font-family: 'Noto Sans SC', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Floating hearts ── */
  .hearts-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .floating-heart {
    position: absolute;
    font-size: 24px;
    animation: floatUp var(--dur) linear infinite;
    animation-delay: var(--delay);
    left: var(--x);
    opacity: 0.6;
  }
  @keyframes floatUp {
    0% { transform: translateY(105vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.7; }
    50% { opacity: 0.6; transform: scale(1) rotate(180deg); }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(0.3); opacity: 0; }
  }

  /* ── Floating petals ── */
  .petal {
    position: absolute;
    width: 14px; height: 18px;
    background: radial-gradient(ellipse at 30% 30%, #e8c8d2, #cc8a9c);
    border-radius: 50% 0 50% 50%;
    animation: petalFall var(--dur) linear infinite;
    animation-delay: var(--delay);
    left: var(--x);
    opacity: 0.7;
  }
  @keyframes petalFall {
    0% { transform: translateY(-5vh) rotate(0deg) translateX(0); opacity: 0.8; }
    25% { transform: translateY(25vh) rotate(90deg) translateX(30px); }
    50% { transform: translateY(50vh) rotate(180deg) translateX(-20px); }
    75% { transform: translateY(75vh) rotate(270deg) translateX(15px); }
    100% { transform: translateY(105vh) rotate(360deg) translateX(-10px); opacity: 0; }
  }

  /* ── Card base ── */
  .card {
    position: relative; z-index: 1;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: var(--radius);
    padding: 40px 36px 36px;
    max-width: 440px; width: 92%;
    box-shadow: var(--shadow-lg);
    text-align: center;
    border: 1px solid var(--card-border);
    /* Tab switching */
    display: none;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.3s ease-out, transform 0.3s ease-out;
  }
  .card.active {
    display: block;
    opacity: 1; transform: translateY(0);
  }

  /* ── Bear ── */
  .bear {
    font-size: 62px;
    margin-bottom: 4px;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-12px); }
    50% { transform: translateY(0); }
    70% { transform: translateY(-6px); }
  }

  .title {
    font-family: var(--font-cute);
    font-size: 24px; color: var(--text);
    margin-bottom: 2px; letter-spacing: 1.5px;
    font-weight: 400;
  }
  .subtitle {
    font-size: 13px; color: var(--text-soft);
    margin-bottom: 6px; font-weight: 300;
  }

  .name-display {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 34px; font-weight: 700;
    margin: 6px 0 16px; letter-spacing: 3px;
    position: relative;
  }
  .name-display::after {
    content: '🌸'; position: absolute;
    right: -34px; top: -2px; font-size: 20px;
    -webkit-text-fill-color: initial;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(10deg); }
  }

  .divider {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
    margin: 0 auto 20px; border-radius: 1px;
  }

  /* ── Counters ── */
  .counters {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }
  .counter-box {
    flex: 1; min-width: 160px;
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 18px; padding: 18px 14px 16px;
    border: 1px solid rgba(255,255,255,0.6);
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: default;
  }
  .counter-box:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  .counter-box .emoji { font-size: 28px; margin-bottom: 4px; }
  .counter-box .label {
    font-size: 12px; color: var(--text-soft); margin-bottom: 4px;
    font-weight: 400; letter-spacing: 0.5px;
  }
  .counter-box .number {
    font-size: 44px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; line-height: 1;
  }
  .counter-box .unit {
    font-size: 12px; color: var(--text-soft); margin-top: 2px;
    font-weight: 300;
  }

  /* ── Progress ── */
  .progress-section { margin-top: 24px; }
  .progress-label {
    font-size: 12px; color: var(--text-soft); margin-bottom: 6px;
    font-weight: 400;
  }
  .progress-bar-outer {
    height: 6px; background: rgba(204,122,140,0.12);
    border-radius: 3px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent-soft), var(--accent), var(--accent-deep));
    border-radius: 3px;
    transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-text {
    font-size: 11px; color: var(--text-soft); margin-top: 4px;
    font-weight: 300;
  }

  /* ── Quote ── */
  .quote {
    margin-top: 24px; font-size: 13px;
    color: var(--text-soft); font-weight: 300;
    font-style: italic; line-height: 1.7;
  }
  .quote .sparkle {
    display: inline-block;
    animation: sparkle 1.5s ease-in-out infinite;
  }
  .quote .sparkle:nth-child(2) { animation-delay: 0.5s; }
  .quote .sparkle:nth-child(3) { animation-delay: 1s; }
  @keyframes sparkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 28px 18px 24px; }
    .counter-box { min-width: 130px; padding: 14px 10px 12px; }
    .number { font-size: 36px; }
    .msg-bubble { max-width: 88%; }
    .msg-input-row { flex-direction: column; gap: 8px; }
    .name-display { font-size: 28px; }
  }

  /* ══════════════════════════════════════
     WEATHER CARD
     ══════════════════════════════════════ */

  .weather-card-header, .period-card-header, .diary-card-header, .msg-card-header {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-bottom: 12px;
  }
  .weather-card-header .icon,
  .period-card-header .icon,
  .diary-card-header .icon,
  .msg-card-header .icon { font-size: 24px; }
  .weather-card-header .title,
  .period-card-header .title,
  .msg-card-header .title {
    font-family: var(--font-cute);
    font-size: 20px; color: var(--text); letter-spacing: 1.5px; font-weight: 400;
  }
  .weather-location {
    text-align: center; font-size: 12px; color: var(--text-soft);
    margin-bottom: 14px; font-weight: 300;
  }
  .weather-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .weather-item {
    background: rgba(255,255,255,0.4);
    border-radius: 14px; padding: 12px 6px; text-align: center;
    border: 1px solid rgba(255,255,255,0.5);
    transition: transform 0.2s;
  }
  .weather-item:hover { transform: translateY(-2px); }
  .weather-item .wi-icon { font-size: 22px; margin-bottom: 3px; }
  .weather-item .wi-label { font-size: 10px; color: var(--text-soft); font-weight: 400; }
  .weather-item .wi-value { font-size: 18px; font-weight: 600; color: var(--text); }
  .weather-item .wi-value.small { font-size: 13px; }
  .weather-temp-main {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: center;
    gap: 14px; padding: 16px 8px;
  }
  .weather-temp-main .wt-big {
    font-size: 48px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; line-height: 1;
  }
  .weather-temp-main .wt-meta {
    text-align: left; font-size: 12px; color: var(--text-soft); line-height: 1.7;
  }
  .weather-loading {
    text-align: center; padding: 20px; color: var(--text-soft);
    font-size: 13px; font-weight: 300;
  }
  .weather-loading .big { font-size: 36px; display: block; margin-bottom: 6px; }
  .weather-error { color: #b85c5c; }
  .weather-suggestions {
    border-top: 1px solid rgba(204,122,140,0.12);
    padding-top: 14px; display: flex; flex-direction: column; gap: 6px;
  }
  .suggestion-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.4);
    border-radius: 12px; font-size: 12px; color: var(--text);
    line-height: 1.6; border: 1px solid rgba(255,255,255,0.45);
  }
  .suggestion-item .si-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
  .suggestion-item .si-text { flex: 1; }
  .suggestion-item .si-text strong { color: var(--accent-deep); font-weight: 600; }

  @media (max-width: 480px) {
    .weather-grid { grid-template-columns: repeat(2, 1fr); }
    .weather-temp-main .wt-big { font-size: 38px; }
  }

  /* ══════════════════════════════════════
     DIARY CALENDAR
     ══════════════════════════════════════ */

  .diary-card { }
  .diary-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .diary-card-header .left { display: flex; align-items: center; gap: 6px; }
  .diary-card-header .title {
    font-family: var(--font-cute);
    font-size: 20px; color: var(--text); letter-spacing: 1.5px; font-weight: 400;
  }
  .diary-month-nav { display: flex; align-items: center; gap: 4px; }
  .diary-month-nav .nav-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(204,122,140,0.18);
    background: rgba(255,255,255,0.45); color: var(--text-soft);
    font-size: 14px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: all 0.2s;
  }
  .diary-month-nav .nav-btn:hover { background: rgba(204,122,140,0.08); border-color: var(--accent-soft); }
  .diary-month-nav .month-label { font-size: 14px; font-weight: 500; color: var(--text); min-width: 80px; text-align: center; }
  .diary-calendar { width: 100%; }
  .diary-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; font-size: 10px; font-weight: 500;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .diary-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .diary-day {
    aspect-ratio: 1; border-radius: 8px; border: 1px solid transparent;
    background: rgba(255,255,255,0.3); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text); transition: all 0.2s; position: relative; min-width: 0;
  }
  .diary-day:hover { background: rgba(204,122,140,0.1); border-color: rgba(204,122,140,0.25); transform: scale(1.04); }
  .diary-day.empty { background: transparent; cursor: default; }
  .diary-day.empty:hover { transform: none; background: transparent; border-color: transparent; }
  .diary-day.today { border-color: var(--accent); font-weight: 600; box-shadow: 0 0 0 1.5px rgba(204,122,140,0.12); }
  .diary-day .mood-emoji { font-size: 13px; line-height: 1; }
  .diary-day .sad-dot, .diary-day .happy-dot { font-size: 5px; position: absolute; bottom: 2px; }
  .diary-day .sad-dot  { right: 5px; color: #7c8cc4; }
  .diary-day .happy-dot { right: 11px; color: #e8b84b; }
  .diary-record-area { text-align: center; margin-top: 12px; }
  .diary-record-btn {
    padding: 10px 28px; border-radius: 20px; border: none;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(168,94,112,0.18);
  }
  .diary-record-btn:hover { opacity: 0.9; transform: scale(1.04); box-shadow: 0 4px 16px rgba(168,94,112,0.28); }
  .view-entry { padding: 12px 16px; border-radius: 14px; background: rgba(255,255,255,0.45); margin-bottom: 12px; }
  .view-entry .ve-mood { text-align: center; font-size: 36px; margin-bottom: 6px; }
  .view-entry .ve-row { font-size: 12px; color: var(--text); line-height: 1.6; padding: 4px 0; }
  .view-entry .ve-row .ve-icon { margin-right: 4px; }
  .view-entry .ve-row strong { color: var(--accent-deep); font-weight: 600; }
  .view-empty { text-align: center; padding: 18px; color: var(--text-soft); font-size: 12px; font-weight: 300; line-height: 1.7; }
  .modal-edit-link { text-align: center; margin-top: 8px; }
  .modal-edit-link a { color: var(--accent); font-size: 11px; cursor: pointer; font-weight: 500; }

  /* ══════════════════════════════════════
     DIARY MODAL
     ══════════════════════════════════════ */

  .modal-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.25s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .modal-card {
    background: #fff; border-radius: 22px;
    padding: 24px 22px 20px; width: 92%; max-width: 400px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-close {
    position: absolute; top: 12px; right: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: rgba(0,0,0,0.05);
    font-size: 16px; cursor: pointer; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .modal-close:hover { background: rgba(0,0,0,0.1); color: var(--text); }
  .modal-date { text-align: center; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
  .mood-section { text-align: center; margin-bottom: 14px; }
  .mood-label { font-size: 12px; color: var(--text-soft); margin-bottom: 6px; font-weight: 500; }
  .mood-options { display: flex; gap: 6px; justify-content: center; }
  .mood-btn {
    width: 42px; height: 42px; border-radius: 50%;
    border: 2px solid transparent; background: rgba(255,255,255,0.5);
    font-size: 24px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .mood-btn:hover { transform: scale(1.1); }
  .mood-btn.selected { border-color: var(--accent); background: rgba(204,122,140,0.08); transform: scale(1.1); box-shadow: 0 2px 8px rgba(168,94,112,0.15); }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 11px; color: var(--text-soft); margin-bottom: 3px; font-weight: 500; }
  .modal-field input, .modal-field textarea {
    width: 100%; padding: 8px 12px; border-radius: 12px;
    border: 1px solid rgba(204,122,140,0.18);
    background: rgba(255,245,247,0.5); color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
    resize: vertical; transition: border 0.2s;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
  .modal-field textarea { min-height: 48px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-btn {
    padding: 8px 18px; border-radius: 16px;
    border: 1px solid rgba(204,122,140,0.18);
    background: rgba(255,255,255,0.6); color: var(--text);
    font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .modal-btn:hover { background: rgba(204,122,140,0.06); }
  .modal-btn.primary { background: var(--accent); color: #fff; border: none; font-weight: 500; }
  .modal-btn.primary:hover { opacity: 0.9; box-shadow: 0 2px 12px rgba(168,94,112,0.25); }
  .modal-btn.danger { color: #b85c5c; border-color: rgba(184,92,92,0.2); }
  .modal-btn.danger:hover { background: rgba(184,92,92,0.05); }

  /* ══════════════════════════════════════
     PERIOD TRACKER
     ══════════════════════════════════════ */

  .period-card { }
  .period-card-header {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 14px;
  }
  .period-card-header .icon { font-size: 24px; }
  .period-card-header .title {
    font-family: var(--font-cute);
    font-size: 20px; color: var(--text); letter-spacing: 1.5px; font-weight: 400;
  }

  /* ── Phase indicator ── */
  .period-phase {
    text-align: center; margin-bottom: 14px;
    padding: 14px 16px; background: rgba(255,255,255,0.4);
    border-radius: 16px; border: 1px solid rgba(255,255,255,0.5);
  }
  .period-phase .pp-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 5px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.5;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
  .period-phase .pp-label { font-size: 17px; font-weight: 600; color: var(--text); }
  .period-phase .pp-sub { font-size: 11px; color: var(--text-soft); margin-top: 4px; font-weight: 300; }
  .period-phase .pp-next { font-size: 12px; color: var(--accent-deep); margin-top: 5px; font-weight: 400; }

  .period-actions { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .period-btn {
    padding: 8px 18px; border-radius: 18px;
    border: 1px solid rgba(204,122,140,0.18);
    background: rgba(255,255,255,0.5); color: var(--text);
    font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .period-btn:hover { background: rgba(204,122,140,0.08); border-color: var(--accent-soft); }
  .period-btn.primary { background: var(--accent); color: #fff; border: none; font-weight: 500; }
  .period-btn.primary:hover { opacity: 0.9; transform: scale(1.03); box-shadow: var(--shadow-md); }
  .period-setup { text-align: center; padding: 18px 14px; background: rgba(255,255,255,0.45); border-radius: 16px; }
  .period-setup label { display: block; font-size: 12px; color: var(--text-soft); margin-bottom: 3px; font-weight: 500; }
  .period-setup input {
    padding: 8px 12px; border-radius: 14px; width: 100%; max-width: 220px;
    border: 1px solid rgba(204,122,140,0.18); background: rgba(255,255,255,0.6);
    color: var(--text); font-size: 13px; font-family: inherit;
    text-align: center; outline: none; margin-bottom: 10px; transition: border 0.2s;
  }
  .period-setup input:focus { border-color: var(--accent); }
  .period-setup .hint { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
  .period-advice { border-top: 1px solid rgba(204,122,140,0.12); padding-top: 14px; }

  body { padding-bottom: 100px !important; }

  /* ══════════════════════════════════════
     DECORATIONS: Wind chime
     ══════════════════════════════════════ */

  .windchime {
    position: fixed; top: 12px; right: 14px; z-index: 50;
    pointer-events: none; cursor: default;
  }
  .windchime .wc-string {
    width: 1.5px; height: 28px; background: #d7ccc8;
    margin: 0 auto; border-radius: 1px;
    animation: chimeSway 4s ease-in-out infinite;
    transform-origin: top center;
  }
  .windchime .wc-bell {
    width: 16px; height: 20px; margin: 0 auto;
    background: linear-gradient(180deg, #fff9f0 0%, #f5e6d3 60%, #e8d5c0 100%);
    border-radius: 50% 50% 30% 30%;
    box-shadow: 0 1px 4px rgba(180,160,140,0.3), inset 0 2px 0 rgba(255,255,255,0.6);
    position: relative;
    animation: chimeSway 4s ease-in-out infinite 0.15s;
    transform-origin: top center;
  }
  .windchime .wc-bell::after {
    content: '🔔'; font-size: 6px;
    position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    opacity: 0.6;
  }
  .windchime .wc-clapper {
    width: 4px; height: 4px; background: #c9b99a;
    border-radius: 50%; margin: 1px auto 0;
    animation: chimeSway 4s ease-in-out infinite 0.3s;
    transform-origin: top center;
  }
  .windchime + .windchime {
    right: 44px; top: 18px;
  }
  .windchime + .windchime .wc-string { height: 22px; }
  .windchime + .windchime .wc-bell { width: 12px; height: 16px; }

  @keyframes chimeSway {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    75% { transform: rotate(-3deg); }
  }

  /* ══════════════════════════════════════
     DECORATIONS: Butterflies
     ══════════════════════════════════════ */

  .butterfly {
    position: fixed; z-index: 10; pointer-events: none;
    font-size: 22px; opacity: 0.7;
    animation: butterflyFly var(--bf-dur) ease-in-out infinite;
    animation-delay: var(--bf-delay);
    left: var(--bf-x); top: var(--bf-y);
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.08));
  }
  @keyframes butterflyFly {
    0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
    15%  { transform: translate(30px, -40px) rotate(8deg) scale(1.1); }
    30%  { transform: translate(-20px, -80px) rotate(-5deg) scale(0.95); }
    45%  { transform: translate(40px, -30px) rotate(12deg) scale(1.05); }
    60%  { transform: translate(-30px, -60px) rotate(-8deg) scale(0.9); }
    75%  { transform: translate(15px, -45px) rotate(4deg) scale(1.08); }
    90%  { transform: translate(-10px, -70px) rotate(-3deg) scale(1); }
    100% { transform: translate(0, -90px) rotate(0deg) scale(0.7); opacity: 0.3; }
  }

  /* ══════════════════════════════════════
     DECORATIONS: White bellflowers
     ══════════════════════════════════════ */

  .bellflower {
    position: fixed; z-index: 5; pointer-events: none;

    animation: bellSway 5s ease-in-out infinite;
    animation-delay: var(--bfr-delay);
    left: var(--bfr-x); top: var(--bfr-y);
    opacity: 0.65;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.06));
  }
  @keyframes bellSway {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    30% { transform: rotate(6deg) translateY(-4px); }
    60% { transform: rotate(-5deg) translateY(2px); }
  }

  .corner-bellflowers {
    position: fixed; bottom: 100px; left: 8px; z-index: 5;
    pointer-events: none; font-size: 24px; opacity: 0.5;
    display: flex; flex-direction: column; align-items: center;
    animation: bellSway 5s ease-in-out infinite;
  }
  .corner-bellflowers.right {
    left: auto; right: 10px;
  }
</style>
</head>

  // ── Day diff ──
  function daysSince(date) {
    const now = new Date();
    const diffMs = now - date;
    return Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));
  }

  function updateCounters() {
    const reconnectDays = daysSince(RECONNECT_DATE);
    const loveDays     = daysSince(LOVE_DATE);

    // Animate numbers
    animateNumber(reconnectEl, reconnectDays);
    animateNumber(loveEl, loveDays);

    // Progress toward 100 days
    const pct = Math.min(100, Math.round((loveDays / 100) * 100));
    progressBar.style.width = pct + '%';
    if (loveDays >= 100) {
      progressText.textContent = '🎉 已达成 100 天！接下来的每一天都是新的里程碑~';
    } else {
      progressText.textContent = '已走过 ' + pct + '% · 还差 ' + (100 - loveDays) + ' 天';
    }
  }

  function animateNumber(el, target) {
    const current = parseInt(el.textContent, 10) || 0;
    if (current === target) return;
    const diff = target - current;
    const steps = Math.min(Math.abs(diff), 40);
    const stepSize = diff / steps;
    let step = 0;
    const interval = setInterval(() => {
      step++;
      el.textContent = Math.round(current + stepSize * step);
      if (step >= steps) {
        el.textContent = target;
        clearInterval(interval);
      }
    }, 40);
  }

  // ── Wind direction code → Chinese ──
  function windDirCN(dir) {
    const map = { N:'北', NNE:'东北偏北', NE:'东北', ENE:'东北偏东',
      E:'东', ESE:'东南偏东', SE:'东南', SSE:'东南偏南',
      S:'南', SSW:'西南偏南', SW:'西南', WSW:'西南偏西',
      W:'西', WNW:'西北偏西', NW:'西北', NNW:'西北偏北' };
    return map[dir] || dir;
  }

  // ── Wind speed km/h → Beaufort scale ──
  function beaufort(kmh) {
    if (kmh < 1)  return '无风';
    if (kmh < 6)  return '1级 软风';
    if (kmh < 12) return '2级 轻风';
    if (kmh < 20) return '3级 微风';
    if (kmh < 29) return '4级 和风';
    if (kmh < 39) return '5级 清风';
    if (kmh < 50) return '6级 强风';
    if (kmh < 62) return '7级 劲风';
    if (kmh < 75) return '8级 大风';
    return '9+级 烈风';
  }

  // ── UV Index → level + color hint ──
  function uvLevel(uv) {
    if (uv <= 2)  return ['🟢','低'];
    if (uv <= 5)  return ['🟡','中等'];
    if (uv <= 7)  return ['🟠','高'];
    if (uv <= 10) return ['🔴','很高'];
    return             ['🟣','极高'];
  }

  // ── Generate suggestions based on weather ──

    const temp     = parseInt(weather.temp_C);

    const windKmh  = parseInt(weather.windspeedKmph);
    const windDir  = windDirCN(weather.winddir16Point);
    const [wEmoji, wText] = weatherDesc(parseInt(weather.weatherCode));
    const maxTemp  = parseInt(weather.maxtempC);
    const minTemp  = parseInt(weather.mintempC);
    const tempDiff = maxTemp - minTemp;

    const suggestions = [];

    // ── 1. 穿衣建议 ──
    let clothing = '';
    if (temp >= 30)      clothing = '天气炎热，建议穿<b>短袖短裤</b>，选择透气面料。出门记得防晒~';
    else if (temp >= 26) clothing = '气温舒适偏暖，建议穿<b>短袖</b>，可备一件薄外套应对空调房。';
    else if (temp >= 22) clothing = '气温宜人，建议<b>薄长袖或短袖+薄外套</b>，轻松应对早晚温差。';
    else if (temp >= 16) clothing = '天气偏凉，建议穿<b>长袖+外套</b>，早晚可加一件卫衣。';
    else if (temp >= 10) clothing = '天气较冷，建议<b>厚外套或卫衣</b>，注意保暖。';
    else                 clothing = '天气寒冷，建议穿<b>羽绒服或棉服</b>，围巾手套备起来！';

    if (windKmh >= 30) clothing += ' 今天风较大，建议穿<b>防风外套</b>。';

    suggestions.push({ icon: '👗', title: '穿衣', text: clothing });

    // ── 2. 护肤建议 ──
    let skincare = '';
    const weatherCode = parseInt(weather.weatherCode);
    const uv = weather.uvIndex || 0;
    const [, uvLabel] = uvLevel(uv);

    if (uv >= 6) {
      skincare = `紫外线指数 <b>${uv}（${uvLabel}）</b>，务必涂抹<b>防晒霜 SPF50+</b>，戴帽子+墨镜，避免长时间暴晒！`;
    } else if (uv >= 3) {
      skincare = `紫外线指数 <b>${uv}（${uvLabel}）</b>，建议涂抹<b>防晒霜 SPF30</b>，短时间户外活动也需防护。`;
    } else if (uv >= 1) {
      skincare = `紫外线指数 <b>${uv}（${uvLabel}）</b>，日常<b>轻薄防晒</b>即可，紫外线较弱不用担心~`;
    } else {
      skincare = '紫外线较弱，做好<b>基础保湿</b>即可。';
    }

    if (humidity < 40) {
      skincare += ' 空气<b>干燥</b>，建议使用<b>保湿精华+面霜</b>，多喝水补充水分 💧';
    } else if (humidity > 75) {
      skincare += ' 湿度较高，建议<b>清爽控油</b>，使用轻薄乳液避免闷痘。';
    } else {
      skincare += ' 湿度适中，保持日常护肤routine即可~';
    }

    suggestions.push({ icon: '🧴', title: '护肤', text: skincare });

    // ── 3. 温差提醒 ──
    let diffText = '';
    if (tempDiff >= 12) {
      diffText = `⚠️ 今天温差高达 <b>${tempDiff}°C</b>（${minTemp}°C ~ ${maxTemp}°C），早晚偏凉中午偏热，<b>一定要带外套</b>，小心着凉感冒！`;
    } else if (tempDiff >= 7) {
      diffText = `今天温差 <b>${tempDiff}°C</b>（${minTemp}°C ~ ${maxTemp}°C），早晚有凉意，建议<b>叠穿法</b>方便随时增减衣物。`;
    } else if (tempDiff >= 4) {
      diffText = `温差 ${tempDiff}°C，体感变化不大，但早晚出门还是<b>留意一下温度</b>哦~`;
    } else {
      diffText = `全天温度稳定在 ${minTemp}°C ~ ${maxTemp}°C 之间，穿衣不用太纠结~`;
    }
    suggestions.push({ icon: '🌡️', title: '温差', text: diffText });

    // ── 4. 综合提醒 ──
    let general = '';
    const isRain = [176,263,266,293,296,299,302,305,308,311,314,317,353,356,359,386,389].includes(weatherCode);
    const isFog  = [143,248,260].includes(weatherCode);
    const isStorm = [200,386,389].includes(weatherCode);

    if (isStorm) {
      general += '⛈️ 今天有<b>雷阵雨</b>，<b>务必带伞</b>，尽量避免在树下避雨。';
    } else if (isRain) {
      general += '🌧️ 今天有雨，出门<b>别忘了带伞</b>☔。';
    }
    if (isFog) {
      general += '🌫️ 今天有雾，出行<b>注意能见度</b>，开车慢行。';
    }
    if (feels - temp >= 3) {
      general += ` 体感温度比实际高 ${feels - temp}°C，会感觉<b>闷热</b>，注意通风降温。`;
    } else if (temp - feels >= 3) {
      general += ` 体感温度比实际低 ${temp - feels}°C，<b>风寒效应</b>明显，多穿一点别硬扛~`;
    }
    if (!isRain && !isFog && !isStorm && Math.abs(feels - temp) < 3) {
      general += `今天天气<b>${wText}</b>，体感舒适，很适合出门散步约会哦 💑`;
    }

    suggestions.push({ icon: '📋', title: '综合', text: general });

    return suggestions;
  }

  // ── Fetch weather from wttr.in ──
  async function fetchWeather() {
    try {
      const url = `https://wttr.in/${WEATHER_LAT},${WEATHER_LON}?format=j1`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      const current = data.current_condition[0];
      const today   = data.weather[0];
      const astro   = today.astronomy[0];

      const weather = {
        temp_C:        current.temp_C,
        FeelsLikeC:    current.FeelsLikeC,
        humidity:      current.humidity,
        windspeedKmph: current.windspeedKmph,
        winddir16Point: current.winddir16Point,
        weatherCode:   current.weatherCode,
        uvIndex:       parseInt(current.uvIndex) || 0,
        maxtempC:      today.maxtempC,
        mintempC:      today.mintempC,
        sunrise:       astro.sunrise,
        sunset:        astro.sunset
      };

      renderWeather(weather);
    } catch (e) {
      console.warn('Weather fetch error:', e.message);
      weatherGrid.innerHTML = `
        <div class="weather-loading weather-error" style="grid-column:1/-1">
          <span class="big">😢</span>
          天气加载失败<br><small>请检查网络连接后刷新页面</small>
        </div>`;
    }
  }

  const PERIOD_KEY = 'love_period_data';

  // ── Load / save period data ──
  // Default: 严梦琪 — cycle 28 days, duration 9 days, last start 2026-06-04
  const PERIOD_DEFAULTS = { lastPeriodStart: '2026-06-04', cycleLength: 28, periodDuration: 9 };
  function loadPeriodData() {
    try {
      const raw = localStorage.getItem(PERIOD_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return PERIOD_DEFAULTS; // hardcoded, no setup needed
  }
  function savePeriodData(data) {
    localStorage.setItem(PERIOD_KEY, JSON.stringify(data));
  }

  // ── Date helpers ──
  function dateStr(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }
  function parseDate(str) {
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function daysBetween(d1, d2) {
    return Math.floor((d2 - d1) / (1000*60*60*24));
  }

  // ── Get current phase info ──
  function getPhaseInfo(data) {
    const today = new Date(); today.setHours(0,0,0,0);
    const lastStart = parseDate(data.lastPeriodStart);
    const cycleDay = daysBetween(lastStart, today) + 1; // day 1 = first day of period

    if (cycleDay <= 0 || cycleDay > data.cycleLength) {
      // Past due — recalculate
      return null;
    }

    const cd = cycleDay;
    let phase, phaseEmoji, phaseColor;
    if (cd <= data.periodDuration) {
      phase = '经期';
      phaseEmoji = '🔴';
      phaseColor = '#e53935';
    } else if (cd <= Math.floor(data.cycleLength * 0.46)) {
      phase = '卵泡期';
      phaseEmoji = '🟢';
      phaseColor = '#43a047';
    } else if (cd <= Math.floor(data.cycleLength * 0.57)) {
      phase = '排卵期';
      phaseEmoji = '🟡';
      phaseColor = '#fb8c00';
    } else {
      phase = '黄体期';
      phaseEmoji = '🟣';
      phaseColor = '#8e24aa';
    }

    const daysUntilNext = data.cycleLength - cd + 1;
    const nextPeriodDate = new Date(today);
    nextPeriodDate.setDate(nextPeriodDate.getDate() + daysUntilNext);

    return { cycleDay: cd, phase, phaseEmoji, phaseColor,
      daysUntilNext, nextPeriodDate: dateStr(nextPeriodDate),
      totalDays: data.cycleLength, periodDuration: data.periodDuration,
      lastPeriodStart: data.lastPeriodStart };
  }

  // ── Render period tracker ──
  function renderPeriodTracker() {
    let data = loadPeriodData();

    // No data yet — show setup
    if (!data || !data.lastPeriodStart) {
      periodPhase.innerHTML = `
        <div class="period-phase">
          <span style="font-size:40px;display:block;margin-bottom:6px;">🌸</span>
          <div class="pp-label">设置经期信息</div>
          <div class="pp-sub">记录后为你提供护理建议</div>
        </div>`;
      periodActions.innerHTML = `
        <button class="period-btn primary" onclick="document.getElementById('periodSetup').style.display='block';this.style.display='none';">📝 开始设置</button>`;
      periodAdvice.innerHTML = '';
      renderSetupForm();
      return;
    }

    // Got data — calculate phase
    const info = getPhaseInfo(data);
    if (!info) {
      // Cycle might have ended without recording new period — prompt
      periodPhase.innerHTML = `
        <div class="period-phase">
          <span style="font-size:40px;display:block;margin-bottom:6px;">📅</span>
          <div class="pp-label">需要更新</div>
          <div class="pp-sub">上次经期：${data.lastPeriodStart}，已超过 ${data.cycleLength} 天</div>
          <div class="pp-next">请记录最近的经期开始日期</div>

        <button class="period-btn primary" onclick="window._recordPeriodStart()">🔴 记录本次经期开始</button>`;
      periodAdvice.innerHTML = '';
      return;

    periodPhase.innerHTML = `
      <div class="period-phase">

        </div>
        <div class="pp-next">

  // ── Global functions for onclick ──
  window._recordPeriodStart = function() {
    const data = loadPeriodData() || { cycleLength: 28, periodDuration: 9 };
    const today = dateStr(new Date());

    // Only record if different from last
    if (data.lastPeriodStart === today) {
      showToast('📅 今天已经记录过啦~');
      return;
    }

    data.lastPeriodStart = today;
    savePeriodData(data);
    renderPeriodTracker();
    showToast('✅ 已记录经期开始：' + today);
  };

  window._savePeriodSetup = function() {
    const lastStart = document.getElementById('psLastStart').value;
    const cycleLen  = parseInt(document.getElementById('psCycleLen').value) || 28;
    const duration  = parseInt(document.getElementById('psDuration').value) || 5;

    if (!lastStart) { showToast('📅 请选择经期开始日期'); return; }

    const data = { lastPeriodStart: lastStart, cycleLength: cycleLen, periodDuration: duration };
    savePeriodData(data);
    periodSetup.style.display = 'none';
    renderPeriodTracker();
    showToast('💾 设置已保存~');
  };

  // ── Toast ──
  function showToast(text) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = text;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 1800);
    setTimeout(() => t.remove(), 2200);
  }

  // ── Relative time ──
  function relativeTime(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const sec = Math.floor(diff / 1000);
    if (sec < 60) return '刚刚';
    const min = Math.floor(sec / 60);
    if (min < 60) return min + '分钟前';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + '小时前';
    const day = Math.floor(hr / 24);
    if (day < 30) return day + '天前';
    const mon = Math.floor(day / 30);
    return mon + '个月前';
  }

  const savedNick = localStorage.getItem('love_msg_nickname');

  function trackVisit(nick) {
    if (!supabase || !nick) return;

  if (supabase) {
    const autoNick = savedNick || '访客';
    trackVisit(autoNick);
    // Update from 访客 to real name once nickname is set
    if (!savedNick) {
      msgNickname.addEventListener('change', () => { trackVisit(msgNickname.value.trim()); }, { once: true });
    }

  function createMsgEl(msg) {
    const isMine = msgNickname.value.trim() && msgNickname.value.trim() === msg.sender;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = '<span class="msg-sender">' + escapeHtml(msg.sender) + '</span>'
      + '<span class="msg-time">' + relativeTime(msg.created_at) + '</span>';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.content;
    row.appendChild(meta);
    row.appendChild(bubble);
    return row;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  let renderedIds = new Set();
  function renderMessages(messages) {
    const empty = msgList.querySelector('.msg-empty');
    if (empty) empty.remove();
    const loading = msgList.querySelector('.msg-loading');
    if (loading) loading.remove();

    if (!messages.length) {
      const el = document.createElement('div');
      el.className = 'msg-empty';
      el.innerHTML = '<span class="big">📝</span>还没有留言<br>写下想对 ta 说的第一句话吧 💕';
      msgList.appendChild(el);
      return;
    }

    messages.forEach(msg => {
      const idStr = String(msg.id);
      if (renderedIds.has(idStr)) return;
      const el = createMsgEl(msg);
      el.dataset.msgId = idStr;
      msgList.appendChild(el);
      renderedIds.add(idStr);
    });

    const rows = msgList.querySelectorAll('.msg-row');
    if (rows.length > 100) {
      for (let i = 0; i < rows.length - 100; i++) {
        renderedIds.delete(rows[i].dataset.msgId);
        rows[i].remove();
      }
    }
    msgList.scrollTop = msgList.scrollHeight;
  }

  // ── Handle send ──
  async function handleSend() {
    const content = msgInput.value.trim();

    if (!supabase) { showToast('🔧 请先配置 Supabase 密钥'); return; }

    msgSendBtn.disabled = true;
    msgSendBtn.textContent = '⏳';

    const { error } = await supabase.from('love_messages').insert([{ sender, content }]);
    if (error) {
      showToast('😢 发送失败：' + error.message);
    } else {
      msgInput.value = '';
    }

    msgSendBtn.disabled = false;
    msgSendBtn.textContent = '💗';
    msgInput.focus();
  }

  msgSendBtn.addEventListener('click', handleSend);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  // ── Init ──
  async function initMessageBoard() {
    if (!supabase) {
      msgList.innerHTML = '<div class="msg-empty"><span class="big">🔧</span>Supabase 未连接<br><small>请配置 SUPABASE_URL 和 SUPABASE_KEY</small></div>';
      return;
    }

    msgList.innerHTML = '<div class="msg-empty msg-loading"><span class="big">⏳</span>加载留言中...</div>';
    const { data: msgs, error } = await supabase.from('love_messages').select('*').order('created_at', { ascending: true }).limit(100);
    if (error) { msgList.innerHTML = '<div class="msg-empty">😢 加载失败</div>'; return; }

    msgList.innerHTML = '';
    renderMessages(msgs || []);

    supabase.channel('msg-channel')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'love_messages' },
        (payload) => { if (payload.new) renderMessages([payload.new]); })
      .subscribe();

    // Re-render diary now that Supabase is ready
    renderCalendar();
  }

  initMessageBoard();

  // ══════════════════════════════════════
  //  BOTTOM NAVIGATION — Tab switching
  // ══════════════════════════════════════

  window.switchTab = function(targetId) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    const target = document.getElementById(targetId);
    if (target) target.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(item => {
      const match = item.getAttribute('onclick') && item.getAttribute('onclick').includes(targetId);
      item.classList.toggle('active', match);
    });
  };

  // ── Generate butterflies ──
  const butterflyEmojis = ['🦋','🦋','🪻','🌸','🌷'];
  const bfContainer = document.getElementById('butterfliesContainer');
  for (let i = 0; i < 8; i++) {
    const span = document.createElement('span');
    span.className = 'butterfly';
    span.textContent = butterflyEmojis[Math.floor(Math.random() * butterflyEmojis.length)];
    span.style.setProperty('--bf-x', (5 + Math.random() * 88) + '%');
    span.style.setProperty('--bf-y', (50 + Math.random() * 45) + '%');
    span.style.setProperty('--bf-dur', (10 + Math.random() * 16) + 's');
    span.style.setProperty('--bf-delay', (Math.random() * 12) + 's');
    span.style.fontSize = (16 + Math.random() * 18) + 'px';
    bfContainer.appendChild(span);
  }
})();
</script>
